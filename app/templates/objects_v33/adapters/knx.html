<label class="check">
  <input type="checkbox" name="enabled" {% if adapter.enabled %}checked{% endif %}>
  Aktiv
</label>

<label for="{{ adapter.protocol }}_direction">Richtung</label>
<select id="{{ adapter.protocol }}_direction" name="direction">
  <option value="both" {% if adapter.direction == 'both' %}selected{% endif %}>both</option>
  <option value="in" {% if adapter.direction == 'in' %}selected{% endif %}>in</option>
  <option value="out" {% if adapter.direction == 'out' %}selected{% endif %}>out</option>
</select>

<label for="{{ adapter.protocol }}_datatype">Datentyp</label>
<select id="{{ adapter.protocol }}_datatype" name="datatype">
  {% for datatype in ['auto', 'bool', 'number', 'text', 'json', 'enum'] %}
    <option value="{{ datatype }}" {% if adapter.datatype == datatype %}selected{% endif %}>{{ datatype }}</option>
  {% endfor %}
</select>

<label for="{{ adapter.protocol }}_group_address">Gruppenadresse</label>
<input id="{{ adapter.protocol }}_group_address" name="group_address" value="{{ adapter.group_address }}" required>

<label for="{{ adapter.protocol }}_dpt">DPT</label>
<select id="{{ adapter.protocol }}_dpt" name="dpt" required>
  <option value="" {% if not adapter.dpt %}selected{% endif %}>Bitte wählen</option>
  {% for dpt_value, dpt_label in [
    ('1.001', 'DPT 1.001 Switch / Bool'),
    ('5.001', 'DPT 5.001 Percent 0-100%'),
    ('5.010', 'DPT 5.010 Counter pulses'),
    ('7.001', 'DPT 7.001 Unsigned 2 byte'),
    ('8.001', 'DPT 8.001 Signed 2 byte'),
    ('9.001', 'DPT 9.001 Temperature °C'),
    ('9.004', 'DPT 9.004 Illuminance lux'),
    ('9.005', 'DPT 9.005 Wind speed m/s'),
    ('9.006', 'DPT 9.006 Pressure Pa'),
    ('9.007', 'DPT 9.007 Humidity %'),
    ('12.001', 'DPT 12.001 Unsigned 4 byte'),
    ('13.001', 'DPT 13.001 Signed 4 byte'),
    ('14.056', 'DPT 14.056 Power W'),
    ('14.019', 'DPT 14.019 Current A'),
    ('14.027', 'DPT 14.027 Voltage V'),
    ('16.001', 'DPT 16.001 Text')
  ] %}
    <option value="{{ dpt_value }}" {% if adapter.dpt == dpt_value %}selected{% endif %}>{{ dpt_label }}</option>
  {% endfor %}
</select>
<div class="count">KNX Gruppenadresse plus DPT sind erforderlich.</div>
<div class="hint">Hinweis: Manche Ziele erwarten fuer Leistung oder Temperatur eher DPT 9.xxx statt 14.xxx.</div>
