<label class="check">
  <input type="checkbox" name="enabled" {% if adapter.enabled %}checked{% endif %}>
  Aktiv
</label>

<label for="{{ adapter.protocol }}_direction">Richtung</label>
<select id="{{ adapter.protocol }}_direction" name="direction">
  <option value="both" {% if adapter.direction == 'both' %}selected{% endif %}>both</option>
  <option value="in" {% if adapter.direction == 'in' %}selected{% endif %}>in</option>
  <option value="out" {% if adapter.direction == 'out' %}selected{% endif %}>out</option>
</select>

<label for="{{ adapter.protocol }}_datatype">Datentyp</label>
<select id="{{ adapter.protocol }}_datatype" name="datatype">
  {% for datatype in ['auto', 'bool', 'number', 'text', 'json', 'enum'] %}
    <option value="{{ datatype }}" {% if adapter.datatype == datatype %}selected{% endif %}>{{ datatype }}</option>
  {% endfor %}
</select>

<label for="{{ adapter.protocol }}_uuid">UUID</label>
<input id="{{ adapter.protocol }}_uuid" name="uuid" value="{{ adapter.uuid }}">

<label for="{{ adapter.protocol }}_io_address">IO-Adresse</label>
<input id="{{ adapter.protocol }}_io_address" name="io_address" value="{{ adapter.io_address }}">

<label for="{{ adapter.protocol }}_control_type">Control-Typ</label>
<input id="{{ adapter.protocol }}_control_type" name="control_type" value="{{ adapter.control_type }}">

<label for="{{ adapter.protocol }}_visu_name">Visu-Name</label>
<input id="{{ adapter.protocol }}_visu_name" name="visu_name" value="{{ adapter.visu_name }}">

<label for="{{ adapter.protocol }}_room">Raum</label>
<input id="{{ adapter.protocol }}_room" name="room" value="{{ adapter.room }}">

<label for="{{ adapter.protocol }}_unit">Einheit</label>
<input id="{{ adapter.protocol }}_unit" name="unit" value="{{ adapter.unit }}">
