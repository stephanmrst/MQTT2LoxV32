<style>
  .udp-layout { display:grid; gap:12px; }
  .udp-box { border:1px solid #344150; background:#10171e; border-radius:6px; padding:12px; }
  .udp-box h3 { margin:0 0 10px; font-size:15px; }
  .udp-grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px; }
  .udp-box .field-span-2 { grid-column:1 / -1; }
  .udp-note { margin-top:10px; color:#9fb0be; font-size:12px; }
  .udp-mini { color:#9aa7b5; font-size:12px; margin-top:6px; }
  .udp-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .udp-actions button { width:auto; }
</style>

<div class="udp-layout">
  <div class="udp-box">
    <h3>UDP Quelle / Empfang</h3>
    <label class="check" style="margin-top:0;">
      <input type="checkbox" name="source_enabled" {% if adapter.source_enabled %}checked{% endif %}>
      UDP-Empfang aktiv
    </label>

    <div class="udp-grid">
      <div>
        <label for="{{ adapter.protocol }}_listen_port">Listen-Port</label>
        <input id="{{ adapter.protocol }}_listen_port" name="listen_port" value="{{ adapter.listen_port }}">
      </div>
      <div>
        <label for="{{ adapter.protocol }}_source_host">Erlaubter Absender Host/IP</label>
        <input id="{{ adapter.protocol }}_source_host" name="source_host" value="{{ adapter.source_host }}">
      </div>
      <div>
        <label for="{{ adapter.protocol }}_source_port">Erlaubter Absender Port</label>
        <input id="{{ adapter.protocol }}_source_port" name="source_port" value="{{ adapter.source_port }}">
      </div>
      <div>
        <label for="{{ adapter.protocol }}_source_payload_mode">Payload-Modus</label>
        <select id="{{ adapter.protocol }}_source_payload_mode" name="source_payload_mode">
          {% set mode = adapter.source_payload_mode or 'value' %}
          <option value="value" {% if mode == 'value' %}selected{% endif %}>Nur Wert</option>
          <option value="topic_value" {% if mode == 'topic_value' %}selected{% endif %}>Topic:Wert</option>
          <option value="json" {% if mode == 'json' %}selected{% endif %}>JSON</option>
        </select>
      </div>
      <div>
        <label for="{{ adapter.protocol }}_source_topic">Topic / Key</label>
        <input id="{{ adapter.protocol }}_source_topic" name="source_topic" value="{{ adapter.source_topic }}">
      </div>
      <div>
        <label for="{{ adapter.protocol }}_source_json_path">JSON-Path</label>
        <input id="{{ adapter.protocol }}_source_json_path" name="source_json_path" value="{{ adapter.source_json_path }}">
      </div>
      <div>
        <label for="{{ adapter.protocol }}_datatype">Datentyp</label>
        <select id="{{ adapter.protocol }}_datatype" name="datatype">
          {% for datatype in ['auto', 'bool', 'number', 'text', 'json', 'enum'] %}
            <option value="{{ datatype }}" {% if adapter.datatype == datatype %}selected{% endif %}>{{ datatype }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="{{ adapter.protocol }}_unit">Einheit</label>
        <input id="{{ adapter.protocol }}_unit" name="unit" value="{{ adapter.unit }}">
      </div>
    </div>
    <div class="udp-note">Ein Listener pro Listen-Port. Topic/Key und JSON-Path werden nur fuer den Match verwendet, wenn sie gesetzt sind.</div>
  </div>

  <div class="udp-box">
    <h3>UDP Ziel / Senden</h3>
    <label class="check" style="margin-top:0;">
      <input type="checkbox" name="target_enabled" {% if adapter.target_enabled %}checked{% endif %}>
      UDP-Ziel aktiv
    </label>

    <div class="udp-grid">
      <div>
        <label for="{{ adapter.protocol }}_target_host">Ziel-IP</label>
        <input id="{{ adapter.protocol }}_target_host" name="target_host" value="{{ adapter.target_host or adapter.target_ip }}">
      </div>
      <div>
        <label for="{{ adapter.protocol }}_target_port">Ziel-Port</label>
        <input id="{{ adapter.protocol }}_target_port" name="target_port" value="{{ adapter.target_port }}">
      </div>
      <div>
        <label for="{{ adapter.protocol }}_udp_topic">UDP Topic</label>
        <input id="{{ adapter.protocol }}_udp_topic" name="udp_topic" value="{{ adapter.udp_topic }}">
      </div>
      <div>
        <label for="{{ adapter.protocol }}_target_payload_mode">Payload-Modus</label>
        <select id="{{ adapter.protocol }}_target_payload_mode" name="target_payload_mode">
          {% set mode = adapter.target_payload_mode or adapter.payload_mode or 'topic_value' %}
          <option value="topic_value" {% if mode == 'topic_value' %}selected{% endif %}>Topic:Wert / Wert</option>
          <option value="value_only" {% if mode == 'value_only' %}selected{% endif %}>Nur Wert</option>
          <option value="json" {% if mode == 'json' %}selected{% endif %}>JSON</option>
        </select>
      </div>
    </div>

    <div class="udp-note">UDP-Quelle und UDP-Ziel sind getrennt speicherbar. Das alte gemeinsame `udp.enabled` wird nicht mehr verwendet.</div>
    <input type="hidden" name="format" value="">
  </div>
</div>
