<label class="check">
  <input type="checkbox" name="enabled" {% if adapter.enabled %}checked{% endif %}>
  Aktiv
</label>

<label for="{{ adapter.protocol }}_direction">Richtung</label>
<select id="{{ adapter.protocol }}_direction" name="direction">
  <option value="both" {% if adapter.direction == 'both' %}selected{% endif %}>both</option>
  <option value="in" {% if adapter.direction == 'in' %}selected{% endif %}>in</option>
  <option value="out" {% if adapter.direction == 'out' %}selected{% endif %}>out</option>
</select>

<label for="{{ adapter.protocol }}_datatype">Datentyp</label>
<select id="{{ adapter.protocol }}_datatype" name="datatype">
  {% for datatype in ['auto', 'bool', 'number', 'text', 'json', 'enum'] %}
    <option value="{{ datatype }}" {% if adapter.datatype == datatype %}selected{% endif %}>{{ datatype }}</option>
  {% endfor %}
</select>

<label for="{{ adapter.protocol }}_bucket">Bucket</label>
<input id="{{ adapter.protocol }}_bucket" name="bucket" value="{{ adapter.bucket }}">
<div class="count">Leer nutzt den globalen Influx-Bucket aus den Einstellungen.</div>

<label for="{{ adapter.protocol }}_measurement">Measurement</label>
<input id="{{ adapter.protocol }}_measurement" name="measurement" value="{{ adapter.measurement }}">
<div class="count">Influx Measurement, z. B. Loxone</div>

<label for="{{ adapter.protocol }}_field">Field</label>
<input id="{{ adapter.protocol }}_field" name="field" value="{{ adapter.field }}">
<div class="count">Influx Field, z. B. Gesamtleistung</div>

<label for="{{ adapter.protocol }}_topic">Topic</label>
<input id="{{ adapter.protocol }}_topic" name="topic" value="{{ adapter.topic }}">
<div class="count">Influx Tag topic, z. B. stromzaehler/leistung</div>

<label for="{{ adapter.protocol }}_tags">Tags optional</label>
<input id="{{ adapter.protocol }}_tags" name="tags" value="{{ adapter.tags }}">
<div class="count">Kommagetrennt, z. B. object_id,source,unit oder key=value.</div>
